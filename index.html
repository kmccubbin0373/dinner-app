<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#fff;--bg2:#f5f4f0;--bg3:#efefea;--t1:#1a1a1a;--t2:#666;--t3:#999;--bd1:rgba(0,0,0,.35);--bd2:rgba(0,0,0,.2);--bd3:rgba(0,0,0,.1);--r1:8px;--r2:12px;--r3:16px}
@media(prefers-color-scheme:dark){:root{--bg1:#1e1e1e;--bg2:#282828;--bg3:#2e2e2e;--t1:#f0f0f0;--t2:#aaa;--t3:#666;--bd1:rgba(255,255,255,.35);--bd2:rgba(255,255,255,.2);--bd3:rgba(255,255,255,.1)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--t1);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg3)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:var(--bg1);border-bottom:.5px solid var(--bd3);position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:500}
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg1);border-bottom:.5px solid var(--bd3);position:sticky;top:52px;z-index:10}
.navbtn{padding:8px 2px 10px;font-size:11px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s;border-bottom:2px solid transparent}
.navbtn i{font-size:20px}
.navbtn.active{color:var(--t1);border-bottom-color:var(--t1)}
.view{flex:1;padding:12px 14px 80px}
.btn{padding:7px 13px;font-size:13px;border:.5px solid var(--bd2);border-radius:var(--r1);background:transparent;color:var(--t1);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .1s}
.btn:hover{background:var(--bg2)}
.btnp{background:var(--t1);color:var(--bg1);border-color:var(--t1)}
.btnp:hover{opacity:.85;background:var(--t1)}
.btnsm{padding:4px 10px;font-size:12px}
.btni{padding:5px;border-radius:var(--r1);border:.5px solid transparent;background:transparent;cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;justify-content:center;transition:all .1s}
.btni:hover{border-color:var(--bd2);background:var(--bg2);color:var(--t1)}
.card{background:var(--bg1);border:.5px solid var(--bd3);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px}
.seg{display:flex;border:.5px solid var(--bd2);border-radius:var(--r1);overflow:hidden;background:var(--bg2)}
.seg button{flex:1;padding:5px 10px;font-size:12px;border:none;background:transparent;color:var(--t2);cursor:pointer;transition:all .1s}
.seg button.active{background:var(--t1);color:var(--bg1)}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--t1);background:var(--bg1);border:.5px solid var(--bd2);border-radius:var(--r1);padding:7px 10px;width:100%;outline:none;transition:border .1s}
input:focus,select:focus,textarea:focus{border-color:var(--bd1)}
label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:1.5px solid transparent;cursor:pointer;user-select:none;transition:all .1s;flex-shrink:0}
.avatar.off{opacity:.3;filter:grayscale(1)}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;border:.5px solid var(--bd3);background:var(--bg2);color:var(--t2)}
.tag.x{cursor:pointer}
.tag.x:hover{border-color:var(--bd2);color:var(--t1)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--bg1);border:.5px solid var(--bd2);border-radius:var(--r3);padding:18px;width:94%;max-width:440px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-scroll{overflow-y:auto;flex:1;padding-right:2px}
.modal h2{font-size:15px;font-weight:500;margin-bottom:14px}
.row{display:flex;gap:8px;align-items:center}
.divider{border:none;border-top:.5px solid var(--bd3);margin:12px 0}
.empty{text-align:center;padding:40px 16px;color:var(--t2);font-size:13px}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:var(--t3)}
.macrobadge{display:inline-flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--t2);margin-top:5px}
.macrobadge span{display:inline-flex;align-items:center;gap:2px}
.macropill{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.ing-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--bd3);font-size:13px}
.ing-row:last-child{border-bottom:none}
.notice{padding:8px 12px;background:var(--bg2);border-radius:var(--r1);font-size:12px;color:var(--t2);border-left:2px solid var(--bd2);margin-bottom:10px}
.goalbars{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.stars{display:inline-flex;align-items:center;gap:1px}
.star{cursor:pointer;transition:transform .1s;user-select:none;line-height:1}
.star:hover{transform:scale(1.2)}
.fav-btn{cursor:pointer;user-select:none;transition:transform .1s;line-height:1}
.fav-btn:hover{transform:scale(1.2)}
.pill-fav{background:#FDECEA;color:#C0392B;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.goalbar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.goalbar-label{color:var(--t2);width:30px}
.goalbar-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.goalbar-fill{height:100%;border-radius:2px;transition:width .3s}
.goalbar-val{color:var(--t2);width:50px;text-align:right}
.ac-wrap{position:relative;flex:1}
.ac-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--bg1);border:.5px solid var(--bd1);border-radius:var(--r1);z-index:999;max-height:180px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.18)}
.ac-item{padding:8px 10px;font-size:13px;cursor:pointer;border-bottom:.5px solid var(--bd3)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--bg2)}
.tag-allergy{background:#FEF3E2;color:#B45309;border-color:#F9D49A}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle-switch{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;position:relative}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;transition:left .2s}
.toggle-on{background:var(--t1)}.toggle-on::after{left:21px}
.toggle-off{background:var(--bd2)}.toggle-off::after{left:3px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--t1);color:var(--bg1);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tag-sel{background:var(--t1)!important;color:var(--bg1)!important;border-color:var(--t1)!important}
/* === PWA / iPhone upgrades === */
body{overscroll-behavior:none;-webkit-overflow-scrolling:touch}
.app{
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
.topbar{padding-top:calc(14px + env(safe-area-inset-top))}

/* Splash screen */
#splash{position:fixed;inset:0;background:#061c2e;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s ease,transform .4s ease}
#splash.hidden{opacity:0;pointer-events:none}
#splash img{width:90px;height:90px;border-radius:20px;animation:splashPop .5s ease forwards}
#splash span{color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:500;letter-spacing:.3px;opacity:0;animation:splashFadeIn .5s .2s ease forwards}
@keyframes splashPop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes splashFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Nav & button feel */
.navbtn{transition:color .15s,transform .08s;-webkit-tap-highlight-color:transparent}
.navbtn:active{transform:scale(.92)}
.btn{-webkit-tap-highlight-color:transparent;transition:background .1s,transform .08s,opacity .1s}
.btn:active{transform:scale(.96)}
.btni{-webkit-tap-highlight-color:transparent;transition:all .1s,transform .08s}
.btni:active{transform:scale(.88)}

/* Modal animation */
.modal-bg{animation:modalBgIn .2s ease forwards}
.modal{animation:modalIn .25s cubic-bezier(.34,1.3,.64,1) forwards}
@keyframes modalBgIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>

  'Turkey Pot Pie':["Make or buy pie crust; cook diced vegetables in butter until soft.", "Stir in flour, then add turkey broth and cream; simmer until thick.", "Fold in cooked turkey and season well.", "Pour filling into a pie dish, top with crust, crimp edges, and cut vents.", "Bake at 425\u00b0F for 30-35 minutes until crust is deeply golden."],

  'Cornish Hen':["Pat hens dry, rub under and over the skin with softened herb butter.", "Season the cavity with salt, pepper, and stuff with lemon halves and thyme.", "Truss the legs together with twine and tuck wing tips under.", "Roast at 425\u00b0F for 50-60 minutes, basting once, until golden and juices run clear.", "Rest 10 minutes before serving over wild rice with roasted carrots."],
  'Beef and Broccoli':["Slice beef thinly against the grain and marinate in soy sauce and cornstarch for 15 minutes.", "Blanch broccoli in boiling water 2 minutes, then drain.", "Sear beef in batches in a very hot wok or skillet, 1-2 minutes, then remove.", "Stir-fry garlic and ginger 30 seconds, add sauce of soy, oyster sauce, and sesame oil.", "Add broccoli and beef back to the pan, toss to coat, and serve over fried rice."],
  'Smoked Brisket':["Trim excess fat to a quarter-inch cap, then coat generously with a rub of salt, pepper, and garlic powder.", "Smoke at 225\u00b0F for 1-1.5 hours per pound until internal temp reaches 165\u00b0F.", "Wrap tightly in butcher paper and continue smoking until internal temp hits 200-205\u00b0F.", "Rest wrapped in a cooler for at least 1 hour.", "Slice against the grain and serve with mac and cheese and coleslaw."],
  'Shepherd\'s Pie':["Brown ground lamb with onion and garlic; drain excess fat.", "Add frozen peas, carrots, beef broth, Worcestershire, and thyme; simmer 10 minutes.", "Make smooth mashed potatoes with butter and cream.", "Spread meat filling in a baking dish and top with an even layer of mashed potatoes.", "Bake at 400\u00b0F for 20-25 minutes until top is golden; let stand 5 minutes before serving."],
  'Cottage Pie':["Brown ground beef with diced onion and garlic until cooked through.", "Stir in tomato paste, beef broth, Worcestershire, and frozen mixed vegetables.", "Simmer 10 minutes until thickened, then spread in a baking dish.", "Top with creamy mashed potatoes and rough up the surface with a fork.", "Bake at 400\u00b0F for 25 minutes until the top is golden and edges are bubbling."],

  'Pasta Carbonara':["Cook spaghetti until al dente and reserve at least a cup of starchy pasta water.", "Render pancetta or guanciale in a cold skillet, then remove from heat.", "Whisk eggs, egg yolks, and Pecorino together in a bowl.", "Toss hot pasta in the pan with pancetta off the heat, then add egg mixture and pasta water, tossing vigorously.", "The residual heat creates a creamy sauce \u2014 never scramble the eggs by using direct heat."],
  'Gnocchi Marinara':["Make or buy gnocchi; heat marinara sauce with garlic and basil in a large pan.", "Cook gnocchi in boiling salted water until they float to the surface, about 2-3 minutes.", "Drain and toss directly into the warm marinara sauce.", "Toss gently to coat and cook 1 more minute so gnocchi absorbs some sauce.", "Serve topped with Parmesan and fresh basil, with garlic bread."],
  'Penne Arrabbiata':["Cook penne until al dente and reserve some pasta water.", "Heat olive oil in a pan and toast sliced garlic and red pepper flakes until fragrant.", "Add crushed tomatoes and simmer 15 minutes until slightly thickened.", "Toss with drained penne, adding pasta water to loosen if needed.", "Serve with a drizzle of good olive oil, fresh parsley, and garlic bread."],
  'Mushroom Risotto':["Heat broth in a separate pan and keep it warm throughout cooking.", "Saut\u00e9 diced onion in butter and olive oil until translucent, then toast arborio rice 2 minutes.", "Add white wine and stir until absorbed, then add warm broth one ladle at a time, stirring constantly.", "Continue adding broth and stirring for 18-20 minutes until rice is creamy and al dente.", "Stir in saut\u00e9ed mushrooms, butter, and Parmesan; season and serve immediately."],
  'Seafood Risotto':["Saut\u00e9 diced shallots and garlic in butter, then toast arborio rice 2 minutes.", "Add white wine and stir until absorbed, then add warm fish or chicken broth ladle by ladle.", "Stir continuously, adding broth every few minutes for 18-20 minutes.", "In the last 5 minutes, add mixed seafood and stir to combine.", "Finish with butter and Parmesan, season to taste, and serve with garlic bread."],
  'Chicken Cacciatore':["Brown chicken pieces in olive oil in a Dutch oven, then remove.", "Saut\u00e9 onion, bell pepper, and garlic in the same pot until soft.", "Add crushed tomatoes, olives, capers, and wine; return chicken to the pot.", "Cover and simmer on low for 35-40 minutes until chicken is tender.", "Serve over spaghetti with a generous ladle of the rustic sauce."],
  'Osso Buco':["Season veal shanks and dredge in flour; sear until deeply browned on all sides.", "Remove shanks and saut\u00e9 diced onion, carrot, celery, and garlic until softened.", "Add white wine, let reduce, then add crushed tomatoes and broth.", "Return shanks, cover, and braise at 325\u00b0F for 1.5-2 hours until fork-tender.", "Make gremolata (lemon zest, garlic, parsley) and sprinkle over before serving with risotto."],
  'Pasta Primavera':["Saut\u00e9 garlic in olive oil until fragrant, then add your choice of spring vegetables.", "Cook vegetables over high heat until tender-crisp, about 5-6 minutes.", "Cook penne until al dente and reserve pasta water.", "Toss pasta with vegetables, olive oil, pasta water, lemon juice, and Parmesan.", "Serve immediately with extra Parmesan and garlic bread."],
  'Cacio e Pepe':["Toast coarsely ground black pepper in a dry pan until fragrant.", "Cook spaghetti until just under al dente, reserving 1.5 cups of starchy pasta water.", "Add pasta water to the pepper and build up a sauce, then add pasta.", "Off the heat, add finely grated Pecorino Romano in batches, tossing vigorously with pasta water to create a creamy sauce.", "Plate immediately with extra pepper and Pecorino."],
  'Amatriciana':["Render guanciale (or pancetta) in a pan until crispy; remove with a slotted spoon.", "Cook thinly sliced onion in the rendered fat until soft.", "Add crushed tomatoes and red pepper flakes; simmer 15 minutes.", "Cook spaghetti until al dente, toss in the sauce with some pasta water.", "Top with the crispy guanciale and grated Pecorino Romano."],
  'Pizza Margherita':["Make or buy pizza dough; preheat oven with a pizza stone to 500\u00b0F for at least 30 minutes.", "Stretch dough into a thin round and place on a floured peel.", "Spread a thin layer of crushed San Marzano tomatoes, leaving a border.", "Top with torn fresh mozzarella and a drizzle of olive oil.", "Slide onto the hot stone and bake 8-10 minutes until crust is charred and blistered."],
  'Calzone':["Make pizza dough and divide; preheat oven to 475\u00b0F.", "Roll out dough into a circle and add ricotta, mozzarella, ham, and sauce on one half.", "Fold the other half over and crimp edges tightly with a fork.", "Brush with egg wash and cut a few slits to vent steam.", "Bake on a pizza stone for 15-20 minutes until golden; serve with marinara for dipping."],
  'Italian Sausage Pasta':["Brown sliced Italian sausage in a pan, then remove and slice into rounds.", "Saut\u00e9 diced onion and bell pepper in the drippings until soft.", "Add crushed tomatoes, Italian seasoning, and a pinch of red pepper flakes; simmer 15 minutes.", "Cook penne until al dente and toss with the sauce and sausage.", "Serve topped with Parmesan and garlic bread."],
  'Stuffed Shells':["Cook jumbo pasta shells until al dente and drain carefully.", "Mix ricotta, mozzarella, egg, spinach, and seasoning for the filling.", "Fill each shell generously and place in a baking dish over a layer of marinara.", "Top with more marinara and shredded mozzarella.", "Cover and bake at 375\u00b0F for 30 minutes, then uncover and bake 10 more until bubbly."],
  'Baked Rigatoni':["Brown ground beef with onion and garlic; drain fat.", "Stir in marinara and simmer 10 minutes.", "Cook rigatoni until just under al dente and drain.", "Toss pasta with meat sauce and half the cheese, spread in a baking dish, and top with remaining cheese.", "Bake at 400\u00b0F for 20-25 minutes until top is golden and bubbling."],
  'Fettuccine Alfredo':["Cook fettuccine until al dente, reserving pasta water.", "Melt butter in a wide pan over medium heat, then add heavy cream and bring to a gentle simmer.", "Add a big handful of finely grated Parmesan and stir to create a smooth sauce.", "Toss with drained pasta, adding pasta water to reach a silky consistency.", "Serve immediately with freshly ground black pepper and more Parmesan."],
  'Tortellini Soup':["Saut\u00e9 diced onion and garlic in olive oil in a large pot.", "Add diced tomatoes and chicken broth; bring to a boil.", "Add cheese tortellini and cook according to package directions.", "Stir in fresh spinach until just wilted.", "Serve topped with grated Parmesan and with garlic bread on the side."],
  'Seafood Pasta':["Saut\u00e9 garlic in olive oil until golden, then add white wine and let reduce by half.", "Add mixed seafood and cook 3-4 minutes until just cooked through.", "Toss in crushed tomatoes, season well, and simmer 5 minutes.", "Cook linguine until al dente, drain, and toss with the seafood sauce.", "Serve with fresh parsley, a drizzle of olive oil, and garlic bread."],
  'Braised Lamb Ragu':["Season lamb shoulder pieces and sear in batches in a Dutch oven until browned.", "Saut\u00e9 onion, carrot, and garlic in the same pot, add tomato paste, rosemary, and red wine.", "Return lamb, add crushed tomatoes and broth, cover and braise at 325\u00b0F for 2.5-3 hours.", "Shred the tender meat with forks and stir back into the sauce.", "Toss with pappardelle, top with Parmesan, and serve with Caesar salad."],
  'Street Tacos':["Season ground beef or steak with cumin, chili powder, garlic powder, salt, and pepper.", "Cook in a hot skillet until browned and slightly crispy on the edges.", "Warm corn tortillas directly over a gas flame or in a dry pan for 30 seconds per side.", "Fill tortillas with meat, diced white onion, and fresh cilantro.", "Squeeze lime over everything and serve with salsa, refried beans, and rice."],
  'Chicken Tacos':["Season diced chicken breast with cumin, chili powder, garlic, and lime zest.", "Cook in a hot oiled skillet until cooked through and slightly charred on the edges.", "Warm flour tortillas in a dry pan or microwave.", "Fill with chicken, shredded cheese, sour cream, and diced tomato.", "Serve alongside Spanish rice and black beans."],
  'Fish Tacos':["Season white fish fillets with cumin, chili powder, and a squeeze of lime.", "Pan-fry in oil over medium-high heat 3-4 minutes per side until flaky and golden.", "Make a quick slaw: toss shredded cabbage with mayo, lime juice, and a pinch of sugar.", "Warm corn tortillas and fill with fish, slaw, and mango salsa.", "Serve with rice and extra lime wedges."],
  'Steak Fajitas':["Season flank steak with cumin, chili powder, garlic, and lime juice; marinate 30 minutes.", "Grill or sear in a cast iron skillet over very high heat 4-5 minutes per side for medium-rare.", "In the same pan, cook sliced bell peppers and onions until charred and tender.", "Slice steak thinly against the grain.", "Serve on warm flour tortillas with sour cream, guacamole, and salsa."],
  'Chicken Fajitas':["Slice chicken breast into strips and toss with fajita seasoning, oil, and lime juice.", "Cook chicken in a hot cast iron skillet until cooked through, then remove.", "Add sliced bell peppers and onions to the same pan and cook until charred and tender.", "Warm flour tortillas in the oven or on the flame.", "Serve chicken and vegetables in tortillas with guacamole, sour cream, and black beans."],
  'Beef Burritos':["Brown ground beef with onion and season with taco seasoning; stir in refried beans.", "Warm large flour tortillas in a pan or microwave.", "Layer rice, beef mixture, cheese, sour cream, and guacamole on each tortilla.", "Roll tightly, tucking in the sides as you go.", "Serve seam-side down with salsa and extra guacamole on the side."],
  'Chicken Burritos':["Cook seasoned chicken and slice or shred.", "Warm large flour tortillas and layer with rice, chicken, black beans, cheese, and sour cream.", "Roll up tightly, tucking in the sides.", "Optional: place in a hot pan seam-side down to seal and lightly crisp the outside.", "Serve with Spanish rice, extra salsa, and a squeeze of lime."],
  'Chicken Enchiladas':["Cook and shred chicken, then mix with a spoonful of enchilada sauce and cheese.", "Dip each corn tortilla briefly in warm enchilada sauce to soften.", "Fill with the chicken mixture, roll up, and place seam-side down in a baking dish.", "Pour remaining enchilada sauce over the top and add a generous layer of cheese.", "Bake at 375\u00b0F for 20-25 minutes until bubbly; serve with rice and refried beans."],
  'Pork Carnitas':["Cube pork shoulder and season with cumin, oregano, garlic, orange zest, and salt.", "Slow cook in a Dutch oven with orange juice at 325\u00b0F for 2.5-3 hours until very tender.", "Shred the pork, spread on a baking sheet with some of the braising liquid.", "Broil 5-8 minutes until edges are crispy.", "Serve in warm corn tortillas with lime, cilantro, pinto beans, and rice."],
  'Chile Rellenos':["Roast poblano peppers over an open flame until charred, then steam in a bag to loosen the skin.", "Peel, make a slit, and stuff each pepper with cheese.", "Separate eggs; beat whites to stiff peaks, then fold in yolks for the batter.", "Dip stuffed peppers in the egg batter and fry in hot oil until golden.", "Drain and serve with tomato sauce, rice, and refried beans."],
  'Chicken Tostadas':["Bake or fry corn tortillas until crispy.", "Season and cook chicken, then shred or slice.", "Spread refried beans on each tostada shell.", "Top with chicken, shredded cheese, avocado, sour cream, and salsa.", "Serve with Mexican rice and black beans."],
  'Beef Nachos':["Spread tortilla chips in a single layer on a foil-lined baking sheet.", "Brown seasoned ground beef and scatter over chips.", "Add shredded cheddar, sliced jalape\u00f1os, and black beans.", "Bake at 400\u00b0F for 8-10 minutes until cheese is fully melted.", "Top with cold toppings: guacamole, sour cream, pico de gallo, and fresh cilantro."],
  'Chicken Quesadillas':["Cook seasoned chicken and slice thinly.", "Heat a large skillet over medium heat and place a flour tortilla in it.", "Add cheese, chicken, and bell pepper to one half, then fold the tortilla over.", "Cook 2-3 minutes per side until golden and cheese is melted.", "Slice into wedges and serve with salsa, sour cream, and guacamole."],
  'Shrimp Tacos':["Season shrimp with chili powder, cumin, garlic, and lime juice.", "Cook in a hot pan with a little oil, 1-2 minutes per side until pink.", "Make mango salsa by combining diced mango, red onion, cilantro, jalape\u00f1o, and lime.", "Warm corn tortillas and fill with shrimp, mango salsa, and a drizzle of crema.", "Serve with Mexican rice and extra lime wedges."],
  'Pork Tacos al Pastor':["Thinly slice pork shoulder and marinate in a blend of dried chiles, pineapple juice, vinegar, and achiote overnight.", "Cook marinated pork in a hot cast iron pan until charred at the edges.", "Grill or caramelize chunks of pineapple alongside the pork.", "Warm corn tortillas and fill with pork, pineapple, diced onion, and cilantro.", "Serve with a squeeze of lime, rice, and black beans."],
  'Carne Asada':["Marinate flank or skirt steak in lime juice, orange juice, garlic, cumin, and cilantro for 2-4 hours.", "Grill over high heat 3-4 minutes per side for medium-rare.", "Rest 5 minutes, then slice thinly against the grain.", "Serve in warm corn tortillas with guacamole, pico de gallo, and a squeeze of lime.", "Accompany with Mexican rice and grilled corn."],
  'Chicken Tortilla Soup':["Brown chicken breasts in a pot with onion and garlic, then shred the chicken.", "Add chicken broth, diced tomatoes, black beans, corn, and Tex-Mex seasoning.", "Simmer 20-30 minutes to meld flavors.", "Bake or fry tortilla strips until crispy.", "Ladle into bowls and top with crispy tortilla strips, shredded cheese, sour cream, and avocado."],
  'Beef Chili':["Brown ground beef in a large pot, then drain most of the fat.", "Add diced onion, bell pepper, and garlic; cook 3 minutes.", "Stir in chili powder, cumin, tomato sauce, kidney beans, and beef broth.", "Simmer uncovered for 30-45 minutes, stirring occasionally, until thickened.", "Serve topped with shredded cheese, sour cream, and green onions with cornbread."],
  'White Chicken Chili':["Cook diced onion and garlic in oil until softened in a large pot.", "Add cooked shredded chicken, white beans, green chiles, and chicken broth.", "Season with cumin, oregano, and a pinch of cayenne.", "Simmer 20-30 minutes, then stir in sour cream and a squeeze of lime.", "Serve with shredded Monterey Jack, cilantro, and warm cornbread."],
  'Birria Tacos':["Simmer dried guajillo and ancho chiles in water, then blend into a sauce with garlic and spices.", "Marinate beef chuck in the chile sauce overnight.", "Braise the beef in the sauce at 325\u00b0F for 3-4 hours until very tender.", "Shred the beef; dip corn tortillas in the braising liquid (consomm\u00e9) and cook in a hot pan.", "Fill with shredded beef and cheese, fold in half, and crisp in the pan; serve with consomm\u00e9 for dipping."],
  'General Tso\'s Chicken':["Cut chicken into bite-sized pieces, toss with cornstarch, and deep fry at 375\u00b0F until crispy.", "Make the sauce: soy sauce, hoisin, rice vinegar, sugar, and cornstarch.", "Stir-fry dried chiles and garlic in a wok for 30 seconds.", "Add the sauce and bring to a bubble, then toss in crispy chicken.", "Serve immediately over steamed rice with spring rolls."],
  'Sweet and Sour Pork':["Cut pork into cubes, coat in a cornstarch batter, and deep fry until golden.", "Make sweet and sour sauce with ketchup, rice vinegar, pineapple juice, and sugar.", "Stir-fry bell peppers and pineapple in a wok 2 minutes.", "Add sauce and bring to a boil until thickened, then toss in pork.", "Serve over fried rice with egg rolls."],
  'Kung Pao Chicken':["Dice chicken and marinate in soy sauce, rice wine, and cornstarch for 15 minutes.", "Make the sauce: soy sauce, rice vinegar, sugar, and chili sauce.", "Stir-fry dried chiles and Sichuan peppercorns in a very hot wok until fragrant.", "Add chicken and stir-fry until cooked through, then add sauce and roasted peanuts.", "Toss together and serve over steamed rice with egg rolls."],
  'Orange Chicken':["Cut chicken into chunks, coat in a cornstarch-egg batter, and fry until golden.", "Make orange sauce: fresh orange juice, soy sauce, sugar, garlic, ginger, and cornstarch.", "Bring sauce to a simmer until thickened.", "Toss crispy chicken in the orange sauce until fully coated.", "Serve over fried rice with spring rolls."],
  'Mongolian Beef':["Slice flank steak thinly against the grain and toss with cornstarch.", "Fry beef in oil until crispy at the edges, then drain.", "Make sauce: soy sauce, brown sugar, garlic, and ginger; simmer until slightly thickened.", "Toss crispy beef in the sauce with sliced green onions.", "Serve over steamed rice with egg rolls."],
  'Sesame Chicken':["Coat chicken pieces in a cornstarch-egg mixture and fry until golden and crispy.", "Whisk together soy sauce, honey, rice vinegar, sesame oil, and garlic for the sauce.", "Bring sauce to a simmer in a wok until slightly thickened.", "Add crispy chicken and toss to coat.", "Sprinkle with sesame seeds and serve over fried rice with spring rolls."],
  'Beef Lo Mein':["Soak or parboil lo mein noodles; prepare a sauce of soy sauce, oyster sauce, sesame oil, and a pinch of sugar.", "Marinate beef strips in soy sauce and cornstarch, then sear quickly in a very hot wok.", "Remove beef and stir-fry vegetables until tender-crisp.", "Add noodles and sauce, toss everything together over high heat.", "Return beef to the wok, toss once more, and serve with egg rolls."],
  'Chicken Lo Mein':["Cook lo mein noodles and drain; make sauce from soy sauce, oyster sauce, and sesame oil.", "Marinate and stir-fry chicken strips in a wok over very high heat until cooked.", "Remove chicken, then stir-fry vegetables until bright and tender-crisp.", "Add noodles and sauce, toss together with the vegetables.", "Return chicken, mix well, and serve with wonton soup."],
  'Vegetable Fried Rice':["Cook rice a day ahead and refrigerate \u2014 day-old rice makes the best fried rice.", "Scramble eggs in a hot wok with a little oil and break into small pieces; remove.", "Stir-fry diced vegetables over very high heat until just tender.", "Add cold rice and press down to let it crisp, then toss with soy sauce and sesame oil.", "Return eggs, toss everything together, and serve with egg rolls and hot and sour soup."],
  'Mapo Tofu':["Cut tofu into cubes and gently blanch in lightly salted water; drain.", "Brown ground pork in a wok with doubanjiang (spicy bean paste) until fragrant.", "Add garlic, ginger, broth, soy sauce, and Sichuan peppercorns; simmer 3 minutes.", "Gently add tofu cubes and simmer 5 more minutes, stirring carefully.", "Thicken with a cornstarch slurry, top with green onions, and serve over steamed rice."],
  'Char Siu Pork':["Marinate pork shoulder overnight in hoisin, soy sauce, honey, five-spice, and red food coloring.", "Roast at 400\u00b0F on a rack for 25 minutes, brushing with marinade halfway through.", "Broil for 5 minutes until edges char and caramelize.", "Rest and slice thinly.", "Serve over fried rice with steamed bok choy, drizzling with any extra glaze."],
  'Dan Dan Noodles':["Make the sauce: sesame paste, soy sauce, chili oil, rice vinegar, and Sichuan pepper.", "Brown ground pork with ya cai (preserved vegetables) and a splash of soy sauce.", "Cook noodles and divide into bowls.", "Top noodles with the sauce and pork mixture.", "Garnish with green onions, crushed peanuts, and extra chili oil; toss before eating."],
  'Chow Mein':["Boil chow mein noodles until tender, then drain and toss with oil to prevent sticking.", "Stir-fry protein and vegetables in a very hot wok until cooked.", "Push to one side, add noodles, and let them crisp slightly against the hot pan.", "Add sauce of soy, oyster sauce, and sesame oil; toss everything together.", "Serve immediately with hot and sour soup."],
  'Hoisin Duck':["Score duck breast skin in a crosshatch pattern and season with salt and five-spice.", "Place skin-side down in a cold pan, then raise heat to medium and render fat 8-10 minutes.", "Flip and cook 4-5 more minutes; rest 5 minutes then slice.", "Warm hoisin sauce and serve as a dipping sauce alongside.", "Serve with fried rice and steamed bok choy."],
  'Beef Chow Fun':["Soak wide flat rice noodles in warm water until pliable; drain.", "Marinate beef strips in soy sauce, oyster sauce, and cornstarch.", "Sear beef in a screaming-hot wok, then remove.", "Toss noodles in the hot wok with oil, soy sauce, and bean sprouts until slightly charred.", "Return beef, toss together, and serve immediately."],
  'Teriyaki Chicken':["Make teriyaki sauce: soy sauce, mirin, sake, and sugar \u2014 simmer until slightly thickened.", "Score chicken thighs and marinate in half the sauce for 30 minutes.", "Pan-fry skin-side down over medium heat until skin is golden and crispy, 8 minutes.", "Flip and cook 5 more minutes, then add remaining sauce and baste until glossy.", "Slice and serve over steamed rice."],
  'Japanese Ramen':["Make or use store-bought broth and simmer with soy sauce, mirin, and kombu.", "Cook ramen noodles until just tender.", "Soft boil eggs for 6.5 minutes, then marinate in soy and mirin.", "Prepare toppings: sliced chashu pork, bamboo shoots, nori, and green onions.", "Ladle hot broth over noodles in a bowl and arrange toppings."],
  'Chicken Katsu':["Pound chicken breasts to even thickness, season with salt and pepper.", "Dredge in flour, dip in beaten egg, then coat thoroughly in panko breadcrumbs.", "Fry in 350\u00b0F oil about 4-5 minutes per side until deep golden brown.", "Drain on a rack and slice diagonally.", "Serve over rice with tonkatsu sauce and a mound of shredded cabbage."],
  'Tonkatsu':["Pound pork cutlets to about half an inch thick and season.", "Dredge in flour, dip in egg, and press firmly into panko breadcrumbs.", "Deep fry at 350\u00b0F for 5-6 minutes until crispy and golden.", "Drain on a wire rack, then slice into strips.", "Serve over rice with tonkatsu sauce, shredded cabbage, and a side of miso soup."],
  'Sushi Bowl':["Cook sushi rice and season with rice vinegar, sugar, and salt while still hot.", "Prepare toppings: slice sashimi-grade fish, slice avocado, julienne cucumber.", "Arrange rice in bowls and top with fish, avocado, cucumber, edamame, and tobiko.", "Drizzle with soy sauce and a squeeze of lemon.", "Garnish with sesame seeds, nori strips, and pickled ginger."],
  'Gyudon':["Thinly slice beef and set aside.", "Simmer sliced onion in dashi, soy sauce, mirin, and sugar until tender.", "Add beef slices and cook just until pink disappears, about 1-2 minutes.", "Serve over steamed rice, topping with a soft-poached or raw egg yolk.", "Garnish with pickled ginger and beni shoga."],
  'Yakitori':["Thread pieces of chicken thigh, skin, and green onion onto bamboo skewers.", "Make tare sauce: soy sauce, mirin, sake, and sugar \u2014 simmer until syrupy.", "Grill over charcoal or a grill pan, turning frequently.", "Brush with tare sauce every turn in the last 2-3 minutes.", "Serve with a cold beer and Japanese pickles on the side."],
  'Tempura':["Make a very light, cold batter with ice-cold water, egg, and flour \u2014 do not overmix.", "Cut vegetables and shrimp into uniform pieces.", "Heat oil to 340-350\u00b0F; dip ingredients in batter and fry in small batches until just barely golden.", "Drain on a rack immediately.", "Serve with tentsuyu dipping sauce (dashi, soy, mirin) and grated daikon."],
  'Udon Noodle Soup':["Make a simple broth with dashi, soy sauce, mirin, and a pinch of sugar.", "Bring to a simmer and taste for seasoning.", "Cook udon noodles separately until tender, then drain.", "Place noodles in bowls and ladle hot broth over top.", "Top with sliced green onion, narutomaki, soft-boiled egg, and a sheet of nori."],
  'Japanese Curry':["Brown chicken or beef pieces in oil in a large pot.", "Add diced onion, carrots, and potatoes; cook 5 minutes.", "Add water or broth and bring to a boil; simmer 15 minutes until vegetables are nearly tender.", "Add Japanese curry roux blocks, stir until fully dissolved, and simmer 10 more minutes.", "Serve over steamed rice with fukujinzuke pickles."],
  'Nikujaga':["Brown thinly sliced beef in a pot with a little oil.", "Add sliced onion, potatoes, and carrots.", "Pour in dashi, soy sauce, mirin, and sugar; bring to a boil.", "Cover and simmer on low 20-25 minutes until potatoes are tender.", "Stir in frozen peas at the end and serve as a comforting stew over rice."],
  'Oyakodon':["Simmer dashi, soy sauce, mirin, and sugar in a skillet.", "Add sliced onion and cook until translucent.", "Add thinly sliced chicken and cook through.", "Beat eggs loosely and pour over the chicken in a circular motion; cover and cook until just set.", "Slide over a bowl of steamed rice, garnish with mitsuba or green onion."],
  'Katsu Curry':["Make chicken katsu: pound, bread, and fry chicken cutlets until golden.", "Prepare Japanese curry sauce using roux blocks with onion, carrot, and potato.", "Simmer curry until vegetables are tender and sauce is thick and glossy.", "Serve steamed rice in a bowl, ladle curry alongside.", "Slice katsu diagonally and lay it over the top; garnish with pickles."],
  'Beef Sukiyaki':["Arrange thinly sliced beef, tofu, noodles, vegetables, and mushrooms around a hot pot or skillet.", "Mix the sukiyaki sauce: soy sauce, mirin, sake, and sugar.", "Pour sauce into the pan, add beef first, and let it cook briefly.", "Dip cooked pieces in raw beaten egg before eating \u2014 this is traditional.", "Add more vegetables and sauce as the meal progresses."],
  'Korean BBQ Beef (Bulgogi)':["Thinly slice ribeye or sirloin; grate an Asian pear or kiwi into the marinade to tenderize.", "Marinate beef in soy sauce, sugar, sesame oil, garlic, and ginger for at least 1 hour.", "Cook in a hot pan or on a grill, in batches so it sears rather than steams.", "The marinade should caramelize on the edges.", "Serve with steamed rice, lettuce wraps, and all the banchan side dishes."],
  'Bibimbap':["Cook each topping separately: saut\u00e9 spinach, julienned zucchini, carrots, and bean sprouts with garlic.", "Season each vegetable simply with sesame oil, soy, and salt.", "Fry an egg sunny-side up.", "Arrange rice in a bowl, lay each vegetable in sections around it, and place the egg on top.", "Add a spoonful of gochujang, drizzle with sesame oil, and mix everything together before eating."],
  'Korean Fried Chicken':["Toss chicken pieces in a light coating of cornstarch, salt, and pepper.", "Double fry: first at 320\u00b0F for 8-10 minutes, then again at 375\u00b0F for 3-4 minutes until super crispy.", "Make sauce: gochujang, soy sauce, honey, garlic, and sesame oil \u2014 toss chicken to coat.", "Alternatively, serve uncoated with dipping sauce on the side.", "Garnish with sesame seeds and serve with pickled daikon and beer."],
  'Japchae':["Soak glass noodles in warm water for 30 minutes, then cook briefly and drain.", "Saut\u00e9 each vegetable separately in sesame oil: spinach, carrots, onion, mushrooms.", "Quickly stir-fry beef strips with soy and garlic.", "Combine noodles, vegetables, and beef in a large bowl.", "Dress with soy sauce, sesame oil, and sugar; toss well and serve warm or at room temperature."],
  'Kimchi Fried Rice':["Use day-old rice for best texture.", "Stir-fry chopped kimchi in butter or sesame oil until fragrant.", "Add cold rice and press into the pan to crisp; toss with kimchi brine, soy sauce, and gochugaru.", "Push rice to one side and scramble an egg in the pan.", "Mix together, drizzle with sesame oil, and top with a fried egg and nori."],
  'Galbi (Korean Ribs)':["Score flanken-style short ribs and marinate overnight in soy sauce, sugar, Asian pear, garlic, ginger, and sesame oil.", "Grill over high heat 3-4 minutes per side until caramelized and slightly charred.", "The sugar in the marinade creates a beautiful glaze.", "Rest briefly before serving.", "Serve with steamed rice, lettuce for wrapping, and banchan side dishes."],
  'Samgyeopsal':["Slice thick pork belly and cook on a tabletop grill or in a cast iron skillet.", "Cook over medium-high heat until fat is rendered and meat is golden, turning occasionally.", "Use kitchen scissors to cut pieces into bite-sized portions.", "Wrap pieces in lettuce with garlic, sliced green onion salad, and ssamjang (spicy paste).", "Serve with kimchi and steamed rice on the side."],
  'Tteokbokki':["Make the sauce: gochujang, gochugaru, soy sauce, sugar, and anchovy broth.", "Bring sauce to a simmer and add cylindrical rice cakes.", "Cook over medium heat for 8-10 minutes, stirring, until rice cakes are tender and sauce is thick.", "Add fish cakes and green onions in the last 2 minutes.", "Serve hot as a main dish or snack, topped with sesame seeds."],
  'Sundubu Jjigae':["Make an anchovy-kombu broth by simmering for 10 minutes.", "Saut\u00e9 gochugaru and garlic in oil until fragrant.", "Add broth, clams or shrimp, zucchini, mushrooms, and tofu, and bring to a boil.", "Add soft tofu in large spoonfuls and simmer 3-4 minutes.", "Crack a raw egg into the boiling stew, cover briefly, and serve immediately over rice."],
  'Doenjang Jjigae':["Saut\u00e9 diced onion and zucchini in sesame oil briefly.", "Dissolve doenjang (fermented soybean paste) in anchovy broth.", "Add tofu cubes, mushrooms, and any other vegetables.", "Simmer 15 minutes, adjusting with more doenjang or broth to taste.", "Serve with steamed rice and banchan."],
  'Shrimp Pad Thai':["Soak rice noodles in warm water for 30 minutes and drain.", "Make pad Thai sauce: fish sauce, tamarind paste, and palm sugar.", "Stir-fry shrimp in a hot wok 2 minutes; push aside and scramble an egg.", "Add noodles and sauce; toss over high heat until noodles are coated.", "Serve topped with bean sprouts, green onion, crushed peanuts, and lime."],
  'Chicken Pad Thai':["Soak rice noodles and prepare sauce of tamarind, fish sauce, and sugar.", "Stir-fry sliced chicken in a very hot wok until cooked, push aside.", "Crack eggs in and scramble, then add drained noodles and sauce.", "Toss together over high heat, add bean sprouts, and cook 1 more minute.", "Top with green onions, crushed peanuts, and a lime wedge."],
  'Green Curry Chicken':["Fry green curry paste in a splash of coconut milk until fragrant.", "Add remaining coconut milk and bring to a gentle simmer.", "Add sliced chicken, fish sauce, palm sugar, and kaffir lime leaves.", "Simmer 15-20 minutes until chicken is cooked through and sauce is fragrant.", "Add Thai basil and serve over jasmine rice."],
  'Red Curry Shrimp':["Fry red curry paste in coconut cream until the oil separates and paste is fragrant.", "Add coconut milk, fish sauce, and palm sugar; bring to a gentle boil.", "Add shrimp and cook 3-4 minutes until pink and just cooked through.", "Add sliced bamboo shoots and a handful of Thai basil.", "Serve over jasmine rice."],
  'Massaman Curry':["Brown beef or chicken in oil, then set aside.", "Fry Massaman curry paste in oil until fragrant.", "Add coconut milk, potatoes, onion, and peanuts; bring to a simmer.", "Return meat, add fish sauce, palm sugar, and tamarind; simmer 30-40 minutes.", "Serve over jasmine rice with warm naan or roti."],
  'Thai Basil Chicken':["Heat a wok to very high heat; fry minced garlic and Thai bird chiles in oil.", "Add ground chicken and break up, cooking until no longer pink.", "Add oyster sauce, soy sauce, fish sauce, and a pinch of sugar.", "Toss in a big handful of fresh Thai basil leaves and stir briefly until wilted.", "Serve immediately over steamed rice topped with a crispy fried egg."],
  'Panang Curry':["Fry Panang curry paste in coconut cream until fragrant.", "Add sliced beef or chicken and toss to coat.", "Pour in remaining coconut milk, fish sauce, and kaffir lime leaves; simmer 15-20 minutes.", "The sauce should be thick and cling to the meat.", "Serve with jasmine rice, garnished with thinly sliced chiles and Thai basil."],
  'Tom Kha Soup':["Simmer coconut milk with lemongrass, galangal, and kaffir lime leaves for 5 minutes.", "Add chicken or shrimp, mushrooms, and bring to a gentle boil.", "Season with fish sauce, lime juice, and a pinch of sugar.", "Remove from heat and taste \u2014 it should be sour, salty, and slightly sweet.", "Ladle into bowls and garnish with fresh cilantro and sliced chiles."],
  'Pad See Ew':["Soak wide rice noodles until pliable; make the sauce of soy sauce, oyster sauce, and sugar.", "Char the noodles in a very hot wok with oil until slightly smoky.", "Push noodles aside, fry an egg, then scramble it into the noodles.", "Add protein (chicken or beef) and broccoli; pour sauce over and toss.", "The smoky char (wok hei) is the key \u2014 cook over the highest heat you have."],
  'Thai Larb':["Toast dry-roasted ground rice in a dry pan until golden; this is the key ingredient.", "Cook ground chicken or pork in a pan with a little water until done.", "Toss with lime juice, fish sauce, chili, shallots, green onion, and mint.", "Add the toasted rice powder and toss everything together.", "Serve at room temperature with jasmine rice, lettuce, and fresh vegetables for dipping."],
  'Chicken Tikka Masala':["Marinate chicken in yogurt, lemon, and spices for at least 2 hours.", "Grill or broil the chicken until slightly charred.", "Make sauce: saut\u00e9 onion, garlic, and ginger, add tomatoes and cream, simmer 15 minutes.", "Blend sauce until smooth, stir in chicken, and simmer 10 more minutes.", "Serve over basmati rice with warm naan."],
  'Butter Chicken':["Marinate chicken in spiced yogurt and cook in a hot oven or pan until charred at edges.", "Make sauce: cook onion, garlic, tomatoes, and spices, then blend until smooth.", "Add butter and cream to the blended sauce and simmer until rich.", "Add chicken to the sauce and simmer 10 minutes.", "Serve over basmati rice with naan for scooping up the sauce."],
  'Lamb Biryani':["Marinate lamb in yogurt and spices for 2 hours.", "Fry onions until deep golden brown (these are essential \u2014 don't rush them).", "Layer half-cooked basmati rice with the lamb and fried onions, saffron milk, and ghee.", "Seal the pot tightly with foil or dough and cook over low heat (dum) for 30-40 minutes.", "Open at the table for maximum drama; serve with raita."],
  'Chicken Biryani':["Marinate chicken in yogurt and whole spices for 1-2 hours.", "Saut\u00e9 onions until golden; add chicken and cook until sealed.", "Par-cook basmati rice until 70% done.", "Layer rice and chicken in a pot, add saffron, fried onions, and ghee.", "Seal and cook on very low heat for 25-30 minutes; serve with raita and pickled onions."],
  'Palak Paneer':["Blanch fresh spinach briefly, then blend into a smooth pur\u00e9e.", "Fry paneer cubes until golden on all sides; set aside.", "Saut\u00e9 onion, garlic, and ginger, add spices, then stir in spinach pur\u00e9e.", "Simmer 10 minutes, add cream and the fried paneer.", "Serve with naan and basmati rice."],
  'Chana Masala':["Saut\u00e9 diced onion until golden, then add garlic, ginger, and tomatoes.", "Add all the spices \u2014 cumin, coriander, garam masala, turmeric \u2014 and cook 2 minutes.", "Add canned chickpeas and a splash of water; simmer 20 minutes until thickened.", "Mash a few chickpeas against the side of the pan to naturally thicken the sauce.", "Serve with basmati rice and warm naan, topped with fresh cilantro."],
  'Dal Makhani':["Soak black lentils and kidney beans overnight, then pressure cook until soft.", "Saut\u00e9 onion, tomatoes, ginger, garlic, and spices until a thick masala forms.", "Add the cooked lentils and simmer on very low heat for 2-4 hours, stirring often.", "Stir in butter and cream generously in the last 30 minutes.", "The long simmer is what creates the signature depth of flavor; serve with naan."],
  'Beef Vindaloo':["Blend dried chiles, vinegar, garlic, ginger, and spices into a smooth paste.", "Marinate beef in the paste overnight.", "Brown onions deeply, then add the marinated beef and cook 10 minutes.", "Add vinegar, water, and potatoes; cover and simmer 1-1.5 hours until very tender.", "The sauce should be tangy, spicy, and rich; serve with basmati rice."],
  'Chicken Korma':["Blend cashews, yogurt, onion, and a splash of cream into a smooth paste.", "Cook whole spices in ghee until fragrant, then add the paste.", "Add chicken pieces and cook, stirring, until sealed.", "Pour in more cream, reduce heat, and simmer gently 20 minutes.", "Serve over basmati rice with naan; garnish with toasted almonds."],
  'Tandoori Chicken':["Score chicken legs deeply and marinate overnight in thick yogurt with Tandoori spices, lemon, and a touch of red food coloring.", "Skewer the chicken and grill on a very hot grill or roast at 500\u00b0F.", "Cook 25-30 minutes, turning once, until charred in spots and cooked through to 165\u00b0F.", "Rest briefly.", "Serve with naan, sliced onions, lemon wedges, and mint chutney."],
  'Greek Moussaka':["Brown ground lamb with onion and garlic, add cinnamon, tomatoes, and red wine; simmer 20 minutes.", "Slice and roast eggplant until tender.", "Make b\u00e9chamel sauce with butter, flour, milk, and Parmesan.", "Layer eggplant, meat sauce, and b\u00e9chamel in a baking dish; repeat.", "Bake at 375\u00b0F for 45 minutes until the top is golden and set; cool before slicing."],
  'Lamb Kebabs':["Mix ground lamb with diced onion, garlic, parsley, cumin, coriander, and salt.", "Press firmly around flat metal skewers, compressing to make sure they hold.", "Grill over high heat 8-10 minutes, turning once or twice.", "The exterior should be slightly charred and crisped.", "Serve with warm pita, tzatziki, sliced tomatoes, and rice."],
  'Chicken Souvlaki':["Cut chicken into cubes and marinate in olive oil, lemon, garlic, and dried oregano for 2 hours.", "Thread onto skewers and grill over medium-high heat 10-12 minutes, turning every few minutes.", "Warm pita bread on the grill.", "Make tzatziki with Greek yogurt, cucumber, garlic, dill, and lemon.", "Serve in pita with tomatoes, onion, and a generous dollop of tzatziki."],
  'Beef Kofta':["Mix ground beef with grated onion, garlic, parsley, cumin, coriander, and cinnamon.", "Form into oval shapes or press around skewers; refrigerate 30 minutes.", "Grill or pan-fry over medium-high heat 8-10 minutes, turning to cook all sides.", "Serve in warm pita with hummus, tomato, cucumber, and a drizzle of tahini.", "Accompany with tabbouleh or rice."],
  'Chicken Shawarma':["Marinate chicken thighs in shawarma spices (cumin, coriander, paprika, turmeric, cinnamon) with yogurt and lemon overnight.", "Roast at 425\u00b0F for 30-35 minutes, or grill until cooked through.", "Rest and slice thinly.", "Serve in warm pita or flatbread with garlic sauce, tomatoes, cucumber, and pickles.", "Drizzle with tahini and fresh parsley."],
  'Falafel Wrap':["Blend soaked (not canned) chickpeas with onion, parsley, cilantro, cumin, and coriander.", "Form into balls or patties and refrigerate 30 minutes.", "Deep fry at 375\u00b0F for 3-4 minutes until crispy and golden.", "Serve in warm pita with hummus, tahini, tomato, cucumber, and pickled turnips.", "Add a drizzle of hot sauce if you like heat."],
  'Lamb Gyro':["Combine ground lamb and beef with Greek spices and process until a paste-like texture.", "Form into a tight loaf and bake at 325\u00b0F for 45-55 minutes.", "Cool, then slice thinly and pan-fry the slices until crisped at the edges.", "Serve in warm pita with tzatziki, tomato, red onion, and French fries inside the wrap.", "The crispy edges of the meat are the key to authentic gyro flavor."],
  'Greek Lemon Chicken':["Season chicken pieces with salt, pepper, and dried oregano.", "Place in a baking dish with sliced lemon, garlic cloves, and a generous pour of olive oil.", "Roast at 400\u00b0F for 40-50 minutes, turning once, until golden and cooked through.", "Baste with the lemony pan juices once or twice during cooking.", "Serve with roasted potatoes cooked in the same juices and a Greek salad."],
  'Spanakopita':["Saut\u00e9 chopped spinach and green onions until wilted; squeeze out all excess moisture.", "Mix with crumbled feta, eggs, and dill.", "Layer buttered sheets of phyllo dough in a baking dish, adding 4-5 sheets.", "Spread filling evenly, then layer more buttered phyllo on top.", "Bake at 375\u00b0F for 40-45 minutes until deeply golden; cool slightly before cutting into squares."],
  'Shakshuka':["Saut\u00e9 diced onion, garlic, and bell pepper in olive oil until soft.", "Add cumin, paprika, and cayenne, then stir in crushed tomatoes.", "Simmer sauce 10-15 minutes until thickened; season generously.", "Make wells in the sauce and crack eggs directly into them.", "Cover and cook 5-8 minutes until whites are set but yolks are still runny; serve with crusty bread."],
  'Moroccan Chicken Tagine':["Brown chicken pieces in oil in a tagine or Dutch oven.", "Add sliced onion, garlic, and a spice blend of cumin, coriander, cinnamon, ginger, and turmeric.", "Add chicken broth, preserved lemon, and olives.", "Cover and simmer on low heat for 45 minutes until chicken is tender.", "Garnish with fresh cilantro and serve with couscous."],
  'Lamb Tagine':["Season lamb shoulder pieces and sear in a tagine or Dutch oven.", "Fry onion, garlic, and a paste of Ras el Hanout spice blend until fragrant.", "Add broth, honey, dried apricots, and almonds; nestle lamb in the sauce.", "Cover tightly and cook at 325\u00b0F for 2 hours until lamb is very tender.", "Serve over couscous with warm flatbread."],
  'Turkish Stuffed Peppers':["Make the filling: brown ground beef or lamb with rice, diced onion, tomatoes, and spices.", "The rice should be par-cooked so it finishes cooking inside the peppers.", "Core bell peppers and fill each one generously.", "Stand peppers in a pot with a sauce of tomatoes, broth, and olive oil.", "Cover and simmer 40-45 minutes until peppers are tender and rice is cooked through."],
  'Persian Chicken Stew':["Saut\u00e9 diced onion until deeply golden, add turmeric, and cook chicken pieces until sealed.", "Add saffron dissolved in warm water for color and aroma.", "Add pomegranate molasses and ground walnuts; stir to combine.", "Simmer on low heat 40-50 minutes until chicken is tender and sauce is thickened.", "Serve over jeweled rice with fresh herbs and walnuts."],
  'Lebanese Chicken':["Marinate chicken in a blend of seven-spice, lemon, garlic, and olive oil for several hours.", "Grill or roast at high heat until cooked through with charred edges.", "Make garlic sauce (toum): blend garlic, salt, lemon, and oil until white and fluffy.", "Serve chicken with pita, the garlic sauce, and a simple tomato-cucumber salad.", "Pickled turnips or vegetables are the classic accompaniment."],
  'Chicken Kebabs':["Cut chicken thighs into chunks and marinate in yogurt, lemon, garlic, and spices.", "Thread onto skewers, alternating with onion and pepper pieces.", "Grill over medium-high heat 12-15 minutes, turning regularly.", "Baste with any remaining marinade during the last few minutes.", "Serve with warm flatbread, a yogurt dip, and a fresh salad."],
  'Lamb Kofta':["Combine ground lamb with grated onion, mint, cumin, coriander, cinnamon, and egg.", "Knead until well mixed and slightly sticky, then form into elongated patties.", "Grill or cook in a pan over medium-high heat 8-10 minutes, turning once.", "Make a quick yogurt sauce with cucumber, garlic, and mint.", "Serve with pita, sliced tomatoes, and the yogurt sauce."],
  'Veggie Stir Fry':["Prepare all vegetables by cutting to similar sizes for even cooking.", "Make the sauce: soy sauce, sesame oil, garlic, ginger, and a pinch of cornstarch.", "Heat a wok until smoking; add oil and start with the firmest vegetables first.", "Add remaining vegetables and stir-fry over high heat 3-4 minutes total.", "Pour in sauce, toss to coat, and serve over steamed rice."],
  'Lentil Soup':["Saut\u00e9 diced onion, carrot, and celery in olive oil until soft.", "Add cumin, coriander, and turmeric; cook 1 minute.", "Add red lentils, crushed tomatoes, and vegetable broth; bring to a boil.", "Simmer 20-25 minutes until lentils break down and soup is thick.", "Season with lemon juice and salt; drizzle with olive oil and serve with crusty bread."],
  'Black Bean Burgers':["Drain and mash black beans, leaving some texture.", "Mix with breadcrumbs, egg, saut\u00e9ed onion and garlic, cumin, and smoked paprika.", "Form into patties and refrigerate 30 minutes to firm up.", "Pan-fry in oil over medium heat 4-5 minutes per side until crispy.", "Serve on toasted buns with lettuce, tomato, avocado, and chipotle mayo."],
  'Veggie Tacos':["Season and roast a mix of diced peppers, zucchini, and corn at 425\u00b0F for 20-25 minutes.", "Warm corn tortillas and fill with roasted vegetables.", "Top with black beans, shredded cheese, avocado, and a squeeze of lime.", "Make a quick salsa fresca with diced tomatoes, onion, cilantro, and jalape\u00f1o.", "Serve with rice and extra salsa on the side."],
  'Caprese Pasta':["Cook pasta until al dente and drain, reserving some pasta water.", "Halve cherry tomatoes and saut\u00e9 briefly in olive oil with garlic until just softened.", "Toss hot pasta with the tomatoes, fresh mozzarella, and a big pour of good olive oil.", "Season generously with salt, pepper, and fresh basil.", "Top with a drizzle of balsamic glaze and serve immediately."],
  'Roasted Veggie Bowl':["Toss diced vegetables (sweet potato, broccoli, bell pepper, red onion) in olive oil and roast at 425\u00b0F for 25-30 minutes.", "Cook a grain base \u2014 quinoa, farro, or rice.", "Make a tahini dressing: tahini, lemon juice, garlic, and water to thin.", "Assemble bowls with grains, roasted vegetables, and any fresh toppings.", "Drizzle with dressing and serve with warm pita."],
  'Mushroom Stroganoff':["Saut\u00e9 sliced mixed mushrooms in butter over high heat until golden and all moisture has evaporated.", "Add diced onion and garlic and cook until soft.", "Splash in white wine or broth and let reduce, then stir in sour cream and Dijon.", "Simmer gently 5 minutes; season with salt, pepper, and fresh thyme.", "Serve over egg noodles or rice."],
  'Vegetable Curry':["Saut\u00e9 diced onion, garlic, and ginger until soft, then add curry powder and cook 1 minute.", "Add diced vegetables (sweet potato, cauliflower, chickpeas) and stir to coat.", "Pour in coconut milk and vegetable broth; bring to a simmer.", "Cook 20-25 minutes until vegetables are tender.", "Stir in spinach, season with salt and lime, and serve over basmati rice."],
  'Zucchini Noodles Marinara':["Use a spiralizer or vegetable peeler to make zucchini noodles.", "Saut\u00e9 the noodles briefly in olive oil over high heat, 2-3 minutes \u2014 you want them tender but not mushy.", "Warm marinara sauce separately and season well.", "Plate zucchini noodles and top with marinara.", "Finish with Parmesan, fresh basil, and a drizzle of olive oil."],
  'Cauliflower Steak':["Slice a whole cauliflower into 1-inch thick steaks from the center.", "Season both sides generously with olive oil, salt, pepper, and smoked paprika.", "Sear in a hot oven-safe skillet until golden, 3-4 minutes per side.", "Transfer to the oven and roast at 425\u00b0F for 10-15 minutes until tender throughout.", "Serve over a sauce (romesco, chimichurri, or tahini) with roasted vegetables and couscous."],
  'Portobello Mushroom Burger':["Marinate portobello caps in balsamic vinegar, olive oil, garlic, and herbs for 30 minutes.", "Grill or roast gill-side down at 400\u00b0F for 15-20 minutes until tender and juicy.", "Top with your choice of cheese in the last 3 minutes to melt.", "Toast burger buns and spread with pesto or chipotle mayo.", "Serve with lettuce, tomato, and all your favorite burger toppings."],
  'Chickpea Curry':["Saut\u00e9 diced onion until golden, then add garlic, ginger, and a generous amount of curry powder.", "Add crushed tomatoes and cook until sauce thickens, about 5 minutes.", "Add canned chickpeas and coconut milk; simmer 15-20 minutes.", "Stir in baby spinach until wilted and season with salt and lemon juice.", "Serve over basmati rice with warm naan."],
  'Stuffed Portobello Mushrooms':["Remove stems from portobello caps and brush with olive oil; roast at 400\u00b0F for 10 minutes.", "Make the filling: saut\u00e9 diced onion, garlic, spinach, and diced tomatoes; mix with breadcrumbs and cheese.", "Fill each mushroom cap generously.", "Return to the oven and bake 15-20 minutes until filling is golden.", "Serve as a main course with a side salad."],
  'Thai Green Curry Tofu':["Press tofu firmly and cut into cubes; pan-fry in oil until golden on all sides.", "Fry green curry paste in coconut cream until fragrant.", "Add remaining coconut milk, fish sauce (or soy for vegan), and kaffir lime leaves.", "Add tofu, bell peppers, and zucchini; simmer 10-15 minutes.", "Finish with Thai basil and serve over jasmine rice."],
  'Pesto Pasta':["Make fresh pesto by blending basil, pine nuts, garlic, Parmesan, and olive oil.", "Cook pasta until al dente, reserving pasta water.", "Toss hot pasta with pesto, loosening with pasta water to reach a creamy consistency.", "Do not cook the pesto or it will brown and lose its bright flavor.", "Serve topped with extra Parmesan, pine nuts, and fresh basil."],
  'Spinach Ricotta Stuffed Shells':["Cook jumbo shells until al dente and drain carefully.", "Wilt fresh spinach, squeeze out all excess water, and chop finely.", "Mix spinach with ricotta, egg, mozzarella, garlic, and nutmeg.", "Fill shells and place in a baking dish over marinara sauce.", "Top with more sauce and mozzarella; bake at 375\u00b0F for 30 minutes until bubbly."],
  'Minestrone':["Saut\u00e9 onion, celery, carrot, and garlic in olive oil until soft.", "Add diced tomatoes, vegetable broth, dried herbs, and a Parmesan rind if you have one.", "Simmer 15 minutes, then add diced zucchini, canned beans, and pasta.", "Cook until pasta is al dente and vegetables are tender.", "Serve with a big spoonful of pesto stirred in and crusty bread."],
  'Falafel Bowl':["Make and fry falafel until crispy (see Falafel Wrap recipe).", "Cook a grain base \u2014 bulgur, quinoa, or rice.", "Make hummus from scratch or use store-bought.", "Prepare fresh toppings: sliced cucumber, tomatoes, pickled red onion, and olives.", "Assemble bowls and drizzle generously with tahini sauce and hot sauce."],
  'Lentil Tacos':["Cook French or beluga lentils with cumin, chili powder, garlic, and vegetable broth until tender.", "Drain excess liquid and cook briefly in a hot pan to concentrate the flavors.", "Warm corn or flour tortillas.", "Fill with the spiced lentils, shredded cabbage, avocado, and pico de gallo.", "Top with a squeeze of lime and pickled jalape\u00f1os."],
  'Mediterranean Grain Bowl':["Cook farro or quinoa according to package directions; season with lemon and olive oil.", "Roast cherry tomatoes and bell peppers at 425\u00b0F for 20 minutes.", "Warm canned chickpeas with olive oil, cumin, and paprika in a pan.", "Assemble bowls: grain, roasted vegetables, chickpeas, cucumber, olives, and feta.", "Drizzle with a lemon-herb dressing or tahini."],
  'Eggplant Stir Fry':["Salt cubed eggplant and let drain 20 minutes, then pat dry.", "Stir-fry eggplant in hot oil until golden and tender; remove.", "Stir-fry garlic, ginger, and chiles 30 seconds, then add a sauce of soy, oyster sauce, and sesame oil.", "Return eggplant, toss to coat, and cook 1 more minute.", "Serve over steamed rice, garnished with sesame seeds and green onion."],
  'Lobster Roll':["Steam or boil live lobsters 8-10 minutes until bright red; cool before shelling.", "Remove meat from claws, knuckles, and tail; chop into generous pieces.", "Mix lobster lightly with a little mayo, lemon juice, chive, and salt \u2014 don't overdress it.", "Butter and toast split-top hot dog buns in a pan until golden.", "Fill buns generously and serve immediately with chips and a cold drink."],
  'Pan Seared Scallops':["Pat scallops completely dry on all sides \u2014 moisture is the enemy of a good sear.", "Season with salt and pepper just before cooking.", "Heat a skillet until extremely hot, add oil with a high smoke point, and sear scallops without moving for 2 minutes.", "Flip and cook 1 more minute; add butter and baste briefly.", "Serve immediately \u2014 scallops are best the moment they come out of the pan."],
  'Seafood Paella':["Toast saffron in warm water; saut\u00e9 onion, garlic, and tomato in oil in a wide paella pan.", "Add paella rice and toast 2 minutes, then add saffron water and hot fish broth.", "Arrange seafood on top \u2014 never stir the rice after this point.", "Cook over medium heat until rice absorbs all the liquid, about 18-20 minutes.", "Allow the bottom crust (socarrat) to form by cooking on high heat for the last 2 minutes; rest 5 minutes before serving."],
  'Shrimp Boil':["Fill a large pot with water, add Old Bay, sliced lemon, garlic, and bay leaves; bring to a boil.", "Add small potatoes first and cook 10 minutes.", "Add corn cobs, cut in half, and cook 5 minutes.", "Add smoked sausage and shrimp; cook 3-4 minutes until shrimp are pink.", "Drain and dump directly onto a newspaper-covered table with melted butter and hot sauce on the side."],
  'Grilled Mahi Mahi':["Pat fish dry and season with olive oil, lemon zest, garlic, and paprika.", "Preheat grill to medium-high and oil the grates well.", "Grill fish 4-5 minutes per side, depending on thickness.", "Mahi Mahi is done when it flakes easily and is opaque throughout.", "Serve with mango salsa, steamed rice, and a wedge of lemon."],
  'Baked Tilapia':["Preheat oven to 400\u00b0F. Place tilapia fillets in a lightly oiled baking dish.", "Season with garlic powder, paprika, lemon juice, salt, and pepper.", "Optionally, top each fillet with a pat of butter and fresh herbs.", "Bake for 12-15 minutes until fish flakes easily with a fork.", "Serve with steamed vegetables and rice or potatoes."],
  'Cajun Shrimp':["Toss shrimp with Cajun seasoning, garlic powder, and a little olive oil.", "Melt butter in a large skillet over medium-high heat until foamy.", "Add shrimp in a single layer and cook 1-2 minutes per side until pink.", "Add a splash of cream, a squeeze of lemon, and fresh parsley.", "Serve over rice or grits with toasted crusty bread."],
  'Blackened Salmon':["Make blackening spice: paprika, cayenne, garlic powder, onion powder, thyme, and oregano.", "Press salmon fillets into the spice mixture, coating evenly.", "Heat a cast iron pan until extremely hot, add a little oil, and cook salmon presentation side down 3-4 minutes.", "Flip and cook 2-3 more minutes; the spices should form a dark crust \u2014 that's correct.", "Serve with steamed rice and a fresh cucumber salad."],
  'Tuna Steak':["Pat tuna steaks dry and coat with a mixture of sesame seeds, salt, and pepper.", "Heat a pan until very hot with a thin layer of oil.", "Sear tuna for 1-2 minutes per side for rare to medium-rare; the center should remain pink.", "Rest briefly, then slice against the grain.", "Serve over rice with a soy-ginger dipping sauce and wasabi."],
  'Steamed Mussels':["Scrub mussels and discard any open ones that don't close when tapped.", "Saut\u00e9 shallots and garlic in butter; add white wine and bring to a boil.", "Add mussels, cover tightly, and steam over high heat 4-5 minutes.", "Discard any mussels that haven't opened.", "Ladle into bowls with the broth and serve with crusty bread for dipping."],
  'Grilled Halibut':["Pat halibut dry, brush with olive oil, and season with salt, pepper, and lemon zest.", "Preheat grill to medium-high and oil the grates generously.", "Grill halibut 4-5 minutes per side; it will release naturally when properly seared.", "Cook until opaque throughout and flakes with light pressure.", "Serve with a herb butter or salsa verde, rice, and grilled vegetables."],
  'Shrimp Fra Diavolo':["Saut\u00e9 minced garlic and red pepper flakes in olive oil until fragrant.", "Add crushed tomatoes and simmer 10 minutes until slightly thickened.", "Add shrimp and cook 3-4 minutes until pink and cooked through.", "Season with salt and a splash of white wine.", "Toss with cooked linguine, top with parsley, and serve with garlic bread."],
  'Crab Pasta':["Saut\u00e9 garlic in olive oil and butter until golden; add white wine and let bubble.", "Add a splash of cream and simmer briefly.", "Stir in crab meat gently, season with lemon juice, parsley, and pepper.", "Toss with al dente linguine, loosening with pasta water if needed.", "Serve immediately with extra parsley and lemon wedges."],
  'Salmon en Croûte':["Season a salmon fillet and spread with a layer of spinach and cream cheese.", "Wrap in puff pastry, sealing all edges tightly; brush with egg wash.", "Score the top decoratively and refrigerate 20 minutes before baking.", "Bake at 400\u00b0F for 25-30 minutes until pastry is deep golden brown.", "Rest 5 minutes before slicing with a sharp knife."],
  'Coconut Shrimp':["Make a coating: mix shredded coconut with panko breadcrumbs.", "Dip shrimp in flour, then egg, then the coconut-panko mixture.", "Fry in 350\u00b0F oil for 2-3 minutes until golden and the coconut is toasted.", "Drain on paper towels.", "Serve with sweet chili dipping sauce, rice, and a fresh salad."],
  'Baked Cod':["Preheat oven to 400\u00b0F. Place cod fillets in a buttered baking dish.", "Mix melted butter, lemon juice, garlic, and herbs; pour over fish.", "Top with seasoned breadcrumbs for a crispy topping.", "Bake 15-20 minutes until fish is opaque and flakes easily.", "Serve with steamed vegetables and roasted or mashed potatoes."],
  'Fried Catfish':["Soak catfish fillets in buttermilk for at least 30 minutes to remove any muddy taste.", "Make a cornmeal coating with cornmeal, flour, Cajun seasoning, salt, and pepper.", "Remove fish from buttermilk, dredge in cornmeal mixture, pressing to adhere.", "Fry in 350\u00b0F oil for 4-5 minutes per side until golden and crispy.", "Drain and serve with hot sauce, coleslaw, and hush puppies."],
  'Grilled Swordfish':["Brush swordfish steaks with olive oil and season with salt, pepper, and herbs.", "Grill over medium-high heat 4-5 minutes per side; swordfish should be just barely translucent in the center.", "Make a quick salsa with tomatoes, capers, olives, and herbs.", "Rest 3 minutes before serving.", "Plate with the salsa spooned over, with a side salad and crusty bread."],
  'New England Clam Chowder':["Cook diced bacon until crispy in a large pot; remove and set aside.", "Saut\u00e9 diced onion and celery in the bacon fat until soft.", "Add diced potatoes and clam juice; simmer until potatoes are tender.", "Add clams and heavy cream; heat gently until steaming \u2014 don't boil or the cream may curdle.", "Serve in bowls topped with crispy bacon, oyster crackers, and fresh chives."],
  'Fish and Chips':["Soak potato strips in cold water 30 minutes to remove starch, then dry completely.", "Make batter: beer, flour, baking powder, salt \u2014 mix until smooth.", "Fry chips at 300\u00b0F until tender but not browned; remove.", "Dip fish in seasoned flour then batter; fry at 375\u00b0F until golden and crispy.", "Raise oil temp and fry chips a second time at 375\u00b0F until golden."],
  'BBQ Pulled Chicken':["Season whole chicken thighs with a dry spice rub.", "Roast at 300\u00b0F for 1.5-2 hours until very tender and easily pulled apart.", "Pull the chicken into shreds using two forks.", "Toss with your favorite BBQ sauce in a pan over low heat until sticky and glazed.", "Pile onto toasted buns and serve with coleslaw and baked beans."],

function expandMeals(raw){
  return raw.map((r,i)=>({
    id:'m'+(i+1),
    name:r[0],sides:[r[1],r[2]],
    macros:{kcal:r[3],prot:r[4],carbs:r[5],fat:r[6]},
    ingredients:parseIngs(r[7]),
    steps:MEAL_STEPS[r[0]]||[],
    oilsAdded:true
  })).map(m=>{if(MEAL_OILS[m.name])m.ingredients=[...m.ingredients,...MEAL_OILS[m.name].filter(o=>!m.ingredients.some(i=>i.n.toLowerCase()===o.n.toLowerCase()))];return m;});
}

function getMonday(d){const dt=new Date(d);const dy=dt.getDay();const df=dt.getDate()-dy+(dy===0?-6:1);dt.setDate(df);return fmt(dt);}
function fmt(d){return new Date(d).toISOString().split('T')[0];}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return fmt(d);}
function dayLabel(ds){return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function planDates(){const n=S.planType==='week'?7:S.planType==='biweekly'?14:30;return Array.from({length:n},(_,i)=>addDays(S.planStart,i));}
function getDay(date){
  if(!S.days[date])return{mealId:null,servings:4,profileIds:[]};
  const d=S.days[date];
  return{...d,profileIds:d.profileIds||[]};
}
function getDislikes(pids){
  const all=[...S.myDislikes];
  (pids||[]).forEach(pid=>{const p=S.profiles.find(x=>x.id===pid);if(p){(p.dislikes||[]).forEach(d=>all.push(d));(p.allergies||[]).forEach(d=>all.push(d));}});
  return all.map(d=>d.toLowerCase().trim());
}
function mealOk(m,dislikes){
  if(!dislikes.length)return true;
  const txt=[m.name,...m.sides,...m.ingredients.map(i=>i.n)].join(' ').toLowerCase();
  return !dislikes.some(d=>txt.includes(d));
}
const RW={0:1,1:0.15,2:0.5,3:1.5,4:3,5:5};
function mealWeight(m){
  const base=(RW[m.rating||0]||1)*(m.fav?4:1);
  const days=daysSinceCooked(m.id);
  const recencyMult=days<3?0.1:days<7?0.4:days<14?0.8:1;
  return base*recencyMult;
}
function daysSinceCooked(mealId){
  const d=S.mealLastCooked[mealId];
  if(!d)return 999;
  return Math.floor((Date.now()-new Date(d+'T12:00:00').getTime())/(1000*60*60*24));
}
function rollMeal(date){
  const day=getDay(date);
  const dis=getDislikes(day.profileIds);
  const season=S.season||'all';
  let ok=S.meals.filter(m=>mealOk(m,dis));
  if(season!=='all')ok=ok.filter(m=>{const ms=S.mealSeasons[m.id]||'all';return ms==='all'||ms===season;});
  if(!ok.length)ok=S.meals.filter(m=>mealOk(m,dis));
  if(!ok.length)return null;
  const w=ok.map(mealWeight);
  const tot=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot;
  for(let i=0;i<ok.length;i++){r-=w[i];if(r<=0)return ok[i];}
  return ok[ok.length-1];
}
const RLABELS=['','Meh','Okay','Good','Great','Love it!'];
function starsHtml(mid,rating,fav,sm=false){
  const r=rating||0;

  const fc=fav?'#E24B4A':'var(--t3)';
  const fi=fav?'♥':'♡';
  return `<div class="stars">${stars}<span class="fav-btn" onclick="event.stopPropagation();toggleFav('${mid}')" style="font-size:${sz}px;color:${fc};margin-left:5px;cursor:pointer">${fi}</span>${r&&!sm?`<span style="font-size:10px;color:var(--t3);margin-left:5px">${RLABELS[r]}</span>`:''}</div>`;
}

async function load(){
  const keys=['meals','profiles','myDislikes','planDays','planMeta','goals','showMacros','pantry','itemPrices','checkedItems','history','lockedDays','dayNotes','leftoverDays','mealTags','mealUrls','mealLastCooked','budgetWeekly','season','mealSeasons'];
  const defaults={meals:DEFAULT_MEALS,profiles:[],myDislikes:[],planDays:{},goals:{kcal:2000,prot:150,carbs:200,fat:65}};
  for(const k of keys){
    try{
      const r=await window.storage.get(k);
      if(r){
        if(k==='meals'){S.meals=JSON.parse(r.value);S.meals.forEach(m=>{if(!m.steps||!m.steps.length)m.steps=MEAL_STEPS[m.name]||[];if(MEAL_OILS[m.name]&&!m.oilsAdded){m.ingredients=[...m.ingredients,...MEAL_OILS[m.name].filter(o=>!m.ingredients.some(i=>i.n.toLowerCase()===o.n.toLowerCase()))];m.oilsAdded=true;}});}
        else if(k==='profiles')S.profiles=JSON.parse(r.value);
        else if(k==='myDislikes')S.myDislikes=JSON.parse(r.value);
        else if(k==='planDays')S.days=JSON.parse(r.value);
        else if(k==='goals')S.goals=JSON.parse(r.value);
        else if(k==='showMacros')S.showMacros=JSON.parse(r.value);
        else if(k==='pantry')S.pantry=JSON.parse(r.value);
        else if(k==='itemPrices')S.itemPrices=JSON.parse(r.value);
        else if(k==='checkedItems')S.checkedItems=JSON.parse(r.value);
        else if(k==='history')S.history=JSON.parse(r.value);
        else if(k==='lockedDays')S.lockedDays=JSON.parse(r.value);
        else if(k==='dayNotes')S.dayNotes=JSON.parse(r.value);
        else if(k==='leftoverDays')S.leftoverDays=JSON.parse(r.value);
        else if(k==='mealTags')S.mealTags=JSON.parse(r.value);
        else if(k==='mealUrls')S.mealUrls=JSON.parse(r.value);
        else if(k==='mealLastCooked')S.mealLastCooked=JSON.parse(r.value);
        else if(k==='budgetWeekly'){const v=JSON.parse(r.value);S.budgetWeekly=v||0;}
        else if(k==='season')S.season=JSON.parse(r.value)||'all';
        else if(k==='mealSeasons')S.mealSeasons=JSON.parse(r.value);
        else if(k==='planMeta'){const m=JSON.parse(r.value);S.planType=m.t;S.planStart=m.s;}
      } else {
        if(k==='meals')S.meals=JSON.parse(JSON.stringify(DEFAULT_MEALS));
        else if(defaults[k]!==undefined && k!=='planMeta')S[k==='planDays'?'days':k]=JSON.parse(JSON.stringify(defaults[k]));
      }
    }catch(e){
      if(k==='meals')S.meals=JSON.parse(JSON.stringify(DEFAULT_MEALS));
    }
  }
  render();
}

function macroBar(kcal,prot,carbs,fat,servings){
  const g=S.goals;
  const tc=kcal*servings,tp=prot*servings,tca=carbs*servings,tf=fat*servings;
  const pct=(v,max)=>Math.min(100,Math.round(v/max*100));
  const over=(v,max)=>v>max?'#E24B4A':'#1D9E75';
  return `<div class="goalbars">
    <div class="goalbar-row"><span class="goalbar-label">Cal</span><div class="goalbar-track"><div class="goalbar-fill" style="width:${pct(tc,g.kcal)}%;background:${over(tc,g.kcal)}"></div></div><span class="goalbar-val">${tc} / ${g.kcal}</span></div>
    <div class="goalbar-row"><span class="goalbar-label">Pro</span><div class="goalbar-track"><div class="goalbar-fill" style="width:${pct(tp,g.prot)}%;background:${over(tp,g.prot)}"></div></div><span class="goalbar-val">${tp}g / ${g.prot}g</span></div>
    <div class="goalbar-row"><span class="goalbar-label">Carb</span><div class="goalbar-track"><div class="goalbar-fill" style="width:${pct(tca,g.carbs)}%;background:${over(tca,g.carbs)}"></div></div><span class="goalbar-val">${tca}g / ${g.carbs}g</span></div>
    <div class="goalbar-row"><span class="goalbar-label">Fat</span><div class="goalbar-track"><div class="goalbar-fill" style="width:${pct(tf,g.fat)}%;background:${over(tf,g.fat)}"></div></div><span class="goalbar-val">${tf}g / ${g.fat}g</span></div>
  </div>`;
}

        ${tags.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">${tags.map(t=>`<span class="tag" style="font-size:10px;padding:1px 5px">${t}</span>`).join('')}</div>`:''}

      <button class="btn btnsm" onclick="doPickMeal('${date}')" title="Pick meal">✎ Pick</button>

  return h;
}

          ${(()=>{const lc=S.mealLastCooked[m.id];if(!lc)return'';const d=Math.floor((Date.now()-new Date(lc+'T12:00:00').getTime())/86400000);return `<div style="font-size:10px;color:var(--t3);margin-top:3px">Last cooked: ${d===0?'today':d===1?'yesterday':d+' days ago'}</div>`;})()}
          ${(()=>{const tags=(S.mealTags||{})[m.id]||[];const url=(S.mealUrls||{})[m.id]||'';return (tags.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${tags.map(t=>`<span class="tag" style="font-size:10px;padding:1px 5px">${t}</span>`).join('')}</div>`:'')+(url?`<a href="${url}" target="_blank" style="font-size:10px;color:var(--t2);display:block;margin-top:3px;text-decoration:none">🔗 Recipe link</a>`:'');})()}
