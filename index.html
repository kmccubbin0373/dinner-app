function toggleShoppingCheck(key){S.checkedItems=S.checkedItems||{};if(S.checkedItems[key])delete S.checkedItems[key];else S.checkedItems[key]=true;save();render();}
function saveItemPrice(key,name,val){S.itemPrices=S.itemPrices||{};const p=parseFloat(val);if(!isNaN(p)&&p>=0)S.itemPrices[name]=p;save();}
function addToPantry(name){if(name&&!S.pantry.includes(name)){S.pantry.push(name);save();render();}}
function removeFromPantry(i){S.pantry.splice(i,1);save();render();}

function rShopping(){
  const dates=planDates();
  const totals={};let mc=0;
  dates.forEach(date=>{
    const day=getDay(date);
    const meal=S.meals.find(m=>m.id===day.mealId);
    if(!meal)return;mc++;
    meal.ingredients.forEach(ing=>{
      const key=`${ing.n}|||${ing.u}`;
      if(!totals[key])totals[key]={n:ing.n,u:ing.u,a:0};
      totals[key].a+=ing.a*day.servings;
    });
  });

  if(!mc)return`<div class="empty">Generate a meal plan first to see your shopping list!</div>`;

  const pantryLower=(S.pantry||[]).map(p=>p.toLowerCase());
  const allItems=Object.entries(totals).map(([key,item])=>({...item,key,inPantry:pantryLower.some(p=>item.n.toLowerCase().includes(p)||p.includes(item.n.toLowerCase()))}));
  const needItems=allItems.filter(i=>!i.inPantry);
  const haveItems=allItems.filter(i=>i.inPantry);
  const checked=S.checkedItems||{};
  const prices=S.itemPrices||{};

  // Estimate cost
  let knownCost=0,knownCount=0;
  needItems.forEach(item=>{if(prices[item.n]!=null){knownCost+=prices[item.n];knownCount++;}});
  const uncounted=needItems.length-knownCount;

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:12px;color:var(--t3)">${mc} meal${mc>1?'s':''} · ${needItems.length} to buy${haveItems.length?` · ${haveItems.length} in pantry`:''}</div>
    <button class="btn btnsm" onclick="openPantryModal()">🏠 Pantry</button>
  </div>`;

  // budget warning
  if(S.budgetWeekly>0&&knownCount>0){
    const over=knownCost>S.budgetWeekly;
    h+=`<div style="font-size:11px;padding:4px 8px;border-radius:var(--r1);background:${over?'#FDECEA':'#E1F5EE'};color:${over?'#E24B4A':'#1D9E75'};margin-bottom:8px">${over?'⚠️ Over budget by $'+(knownCost-S.budgetWeekly).toFixed(2):'✓ $'+(S.budgetWeekly-knownCost).toFixed(2)+' under budget'}</div>`;
  }
  if(knownCount>0){
    h+=`<div class="card" style="margin-bottom:10px;padding:10px 14px">
      <div style="font-size:12px;font-weight:500;margin-bottom:2px">Estimated cost</div>
      <div style="font-size:22px;font-weight:600">$${knownCost.toFixed(2)}</div>
      <div style="font-size:11px;color:var(--t3)">${knownCount} items priced${uncounted>0?` · ${uncounted} items not yet priced`:''}</div>
    </div>`;
  }

  // group by store section
  const SECTIONS={'Produce':['tomato','onion','garlic','lemon','lime','pepper','carrot','celery','spinach','mushroom','zucchini','broccoli','lettuce','cilantro','parsley','basil','ginger','avocado','corn','potato','eggplant','cucumber','scallion','green onion','shallot','pea','bean sprout','bok choy','kale','arugula','fruit','apple','orange','mango','pineapple','herb'],'Meat & Seafood':['chicken','beef','pork','lamb','turkey','duck','steak','shrimp','fish','salmon','tuna','crab','lobster','scallop','mussel','clam','sausage','bacon','ham','veal','ribs','brisket','tenderloin','mahi','tilapia','catfish','cod','halibut','swordfish','fillet'],'Dairy':['butter','milk','cream','cheese','yogurt','egg','ghee','parmesan','mozzarella','ricotta','feta'],'Pantry':['oil','sauce','paste','broth','stock','flour','sugar','salt','pepper','spice','vinegar','wine','soy','hoisin','oyster','fish sauce','coconut milk','tomato','breadcrumb','panko','cornstarch','rice','noodle','pasta','lentil','bean','chickpea'],'Frozen':['frozen'],'Other':[]};
  function getSection(name){const n=name.toLowerCase();for(const[sec,kws]of Object.entries(SECTIONS)){if(sec==='Other')continue;if(kws.some(k=>n.includes(k)))return sec;}return 'Other';}
  if(needItems.length){
    const uncheckedItems=needItems.filter(i=>!checked[i.key]);
    const checkedItems=needItems.filter(i=>checked[i.key]);
    const remaining=uncheckedItems.length;
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:12px;font-weight:500;color:var(--t2)">${remaining} item${remaining!==1?'s':''} remaining</div>
      ${checkedItems.length?`<button class="btn btnsm" onclick="carryForwardPantry()">Move checked to pantry</button>`:''}
    </div>`;
    // Group by store section
    const grouped={};
    [...uncheckedItems,...checkedItems].forEach(item=>{const sec=getSection(item.n);if(!grouped[sec])grouped[sec]=[];grouped[sec].push(item);});
    const secOrder=['Produce','Meat & Seafood','Dairy','Pantry','Frozen','Other'];
    secOrder.filter(s=>grouped[s]&&grouped[s].length).forEach(sec=>{
      h+=`<div style="font-size:11px;font-weight:600;color:var(--t2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px">${sec}</div>`;
      h+=`<div class="card" style="padding:4px 0;margin-bottom:4px">`;
      grouped[sec].forEach(item=>{
      const amt=item.a%1===0?item.a:parseFloat(item.a.toFixed(2));
      const isChecked=!!checked[item.key];
      const price=prices[item.n]!=null?`$${prices[item.n].toFixed(2)}`:'';
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:.5px solid var(--bd3);${isChecked?'opacity:0.4':''}">
        <div onclick="toggleShoppingCheck('${item.key.replace(/'/g,"\\'")}' )" style="width:20px;height:20px;border-radius:50%;border:1.5px solid ${isChecked?'var(--t1)':'var(--bd2)'};background:${isChecked?'var(--t1)':'transparent'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--bg1);font-size:11px">${isChecked?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;${isChecked?'text-decoration:line-through':''}">${item.n}</div>
          <div style="font-size:11px;color:var(--t3)">${amt}${item.u?' '+item.u:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
          <span style="font-size:12px;color:var(--t2);min-width:36px;text-align:right">${price}</span>
          <button class="btn btnsm" style="padding:3px 6px;font-size:11px" onclick="openPriceModal('${item.n.replace(/'/g,"\\'")}')">$</button>
          <button class="btn btnsm" style="padding:3px 6px;font-size:11px" onclick="addToPantry('${item.n.replace(/'/g,"\\'")}')">🏠</button>
        </div>
      </div>`;
      });
      h+=`</div>`;
    });  // end secOrder forEach
  }

  if(haveItems.length){
    h+=`<div style="font-size:12px;font-weight:500;color:var(--t3);margin-bottom:6px">Already in pantry (not buying)</div>
    <div class="card" style="padding:4px 0;margin-bottom:10px">`;
    haveItems.forEach(item=>{
      const amt=item.a%1===0?item.a:parseFloat(item.a.toFixed(2));
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:.5px solid var(--bd3);opacity:0.5">
        <div style="width:20px;height:20px;border-radius:50%;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px">🏠</div>
        <div style="flex:1"><div style="font-size:13px">${item.n}</div><div style="font-size:11px;color:var(--t3)">${amt}${item.u?' '+item.u:''}</div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  return h;
}

function openPriceModal(name){
  const prices=S.itemPrices||{};
  const cur=prices[name]!=null?prices[name]:'';
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <h2 style="margin:0;font-size:15px">Price for ${name}</h2>
    <button class="btni" onclick="closeModal()">✕</button>
  </div>
  <label>Last price paid ($)</label>
  <input id="price-inp" type="number" min="0" step="0.01" value="${cur}" placeholder="e.g. 3.99" style="margin-bottom:14px">
  <div style="font-size:11px;color:var(--t3);margin-bottom:14px">This saves for future cost estimates. Update it each time you shop.</div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btnp" onclick="saveItemPrice('','${name.replace(/'/g,"\\'")}',document.getElementById('price-inp').value);closeModal();render()">Save</button>
  </div>`;
  showModal(h);
}

function openPantryModal(){
  function pantryHtml(){
    return (S.pantry||[]).map((p,i)=>`<span class="tag x" onclick="removeFromPantry(${i});document.getElementById('pantry-list').innerHTML=pantryTagsHtml()">${p} <span style="font-size:10px">×</span></span>`).join('');
  }
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <h2 style="margin:0;font-size:15px">🏠 My Pantry</h2>
    <button class="btni" onclick="closeModal()">✕</button>
  </div>
  <div style="font-size:12px;color:var(--t2);margin-bottom:10px">Items in your pantry are filtered out of the shopping list. Tap × to remove.</div>
  <div id="pantry-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:24px">${pantryHtml()}</div>
  <div style="position:relative;margin-bottom:14px">
    <div class="row">
      <input id="pantry-inp" placeholder="Type an ingredient you already have…" style="flex:1" oninput="acSearch('pantry-inp','pantry-drop',this.value)" onkeydown="if(event.key==='Enter')pantryAdd()">
      <button class="btn btnsm" onclick="pantryAdd()">Add</button>
    </div>
    <div id="pantry-drop" class="ac-drop" style="display:none"></div>
  </div>
  <button class="btn btnp" style="width:100%;justify-content:center" onclick="closeModal();render()">Done</button>`;
  showModal(h);
  window.pantryAdd=()=>{
    const v=document.getElementById('pantry-inp').value.trim();
    if(v&&!S.pantry.includes(v)){S.pantry.push(v);save();}
    document.getElementById('pantry-inp').value='';
    hideAc('pantry-drop');
    document.getElementById('pantry-list').innerHTML=pantryHtml();
  };
  window.pantryTagsHtml=pantryHtml;
  // wire up remove from inside modal
  window.removeFromPantry=(i)=>{S.pantry.splice(i,1);save();document.getElementById('pantry-list').innerHTML=pantryHtml();};

  document.getElementById('pantry-inp').oninput=function(){acSearch('pantry-inp','pantry-drop',this.value);};
}

function getIngredientSuggestions(){
  const seen=new Set();
  S.meals.forEach(m=>m.ingredients.forEach(i=>{const t=i.n.trim();if(t)seen.add(t);}));
  return [...seen].sort();
}
function acSearch(inputId,dropId,q){
  const drop=document.getElementById(dropId);
  if(!drop)return;
  const qt=q.trim();
  if(!qt){drop.style.display='none';return;}
  const lq=qt.toLowerCase();
  const matches=getIngredientSuggestions().filter(s=>s.toLowerCase().includes(lq)).slice(0,6);
  // Always put the exact typed text first so user can add custom words
  const items=[qt,...matches.filter(s=>s.toLowerCase()!==lq)];
  drop.innerHTML=items.map((s,i)=>`<div class="ac-item" onclick="acPick('${inputId}','${dropId}','${s.replace(/'/g,"\\'")}')">${i===0&&s===qt?`<span style="font-size:10px;color:var(--t3);margin-right:4px">Add:</span>`:''}${s}</div>`).join('');
  drop.style.display='block';
}
function acPick(inputId,dropId,val){
  const inp=document.getElementById(inputId);
  if(inp)inp.value=val;
  hideAc(dropId);
  if(inputId==='pf-dis-inp')pfAddDislike();
  else if(inputId==='pf-alg-inp')pfAddAllergy();
  else if(inputId==='my-dis-inp')addMyDislike();
}
function hideAc(dropId){const d=document.getElementById(dropId);if(d)d.style.display='none';}

function pickMeal(date,mid){
  const m=S.meals.find(x=>x.id===mid);

function openRecipeModal(mealId, date){

  // Fixed header
  let header=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0">
    <h2 style="margin:0;font-size:16px">${meal.name}</h2>

    <div class="card" style="padding:8px 14px;margin-bottom:14px">`;

      body+=`<div class="ing-row"><span>${ing.n}</span><span style="font-size:12px;color:var(--t2);font-weight:500">${fmtAmt(ing.a)}${ing.u?' '+ing.u:''}</span></div>`;
    });
    body+=`</div>`;
  }

  if(meal.macros&&meal.macros.kcal&&S.showMacros){
    const mac=meal.macros;

      <div style="flex:1;min-width:56px;text-align:center;padding:8px;background:var(--bg2);border-radius:var(--r1)"><div style="font-size:15px;font-weight:600">${Math.round(mac.kcal*servings)}</div><div style="font-size:10px;color:var(--t3)">calories</div></div>
      <div style="flex:1;min-width:56px;text-align:center;padding:8px;background:var(--bg2);border-radius:var(--r1)"><div style="font-size:15px;font-weight:600">${Math.round(mac.prot*servings)}g</div><div style="font-size:10px;color:var(--t3)">protein</div></div>
      <div style="flex:1;min-width:56px;text-align:center;padding:8px;background:var(--bg2);border-radius:var(--r1)"><div style="font-size:15px;font-weight:600">${Math.round(mac.carbs*servings)}g</div><div style="font-size:10px;color:var(--t3)">carbs</div></div>
      <div style="flex:1;min-width:56px;text-align:center;padding:8px;background:var(--bg2);border-radius:var(--r1)"><div style="font-size:15px;font-weight:600">${Math.round(mac.fat*servings)}g</div><div style="font-size:10px;color:var(--t3)">fat</div></div>
    </div>`;
  }

  if(meal.steps&&meal.steps.length){
    body+=`<div style="font-size:13px;font-weight:600;margin-bottom:10px">Instructions</div>`;
    meal.steps.forEach((step,i)=>{

function impSwitchTab(tab){

function impPhotoSelected(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{

    document.getElementById('imp-photo-preview').style.display='';

async function doImportRecipe(){
  const btn=document.getElementById('import-btn');
  const status=document.getElementById('import-status');
  const preview=document.getElementById('import-preview');
  btn.disabled=true;btn.textContent='Importing…';
  status.textContent='Asking AI to parse your recipe…';
  preview.innerHTML='';

  const tab=window._impTab||'text';
  const isPhoto=tab==='photo';

  const recipePrompt=`Extract the following from this recipe and respond ONLY with valid JSON, no markdown, no explanation:
{
  "name": "Main dish name (string)",
  "side1": "First side dish (string, or empty string)",
  "side2": "Second side dish (string, or empty string)",
  "servings": number (how many servings the recipe makes, default 4),
  "kcal": number or null (calories per serving),
  "prot": number or null (protein grams per serving),
  "carbs": number or null (carb grams per serving),
  "fat": number or null (fat grams per serving),
  "ingredients": [{"n": "ingredient name", "a": amount_per_serving_as_number, "u": "unit"}],
  "steps": ["Step 1 text", "Step 2 text", "Step 3 text"]
}
Rules:
- Scale ingredient amounts to PER SERVING (divide by servings count)
- Keep ingredient names clean and short
- If nutrition info is missing, estimate it based on ingredients
- Side dishes: what the recipe is typically served with, or leave empty
- steps: plain text instructions, strip any numbering prefix
- Round numbers sensibly`;

  try{
    let messages;
    if(isPhoto){
      const photoData=window._impPhotoData;
      if(!photoData){alert('Please select a photo first.');btn.disabled=false;btn.textContent='Import with AI';return;}
      const base64=photoData.split(',')[1];
      const mediaType=photoData.split(';')[0].split(':')[1];
      messages=[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:'This is a photo of a recipe from a cookbook or recipe card. '+recipePrompt}
      ]}];
    } else {
      const input=document.getElementById('import-input').value.trim();
      if(!input){alert('Please paste a URL or recipe text.');btn.disabled=false;btn.textContent='Import with AI';return;}
      const isUrl=/^https?:\/\//i.test(input);
      messages=[{role:'user',content:`You are a recipe parser. The user has provided ${isUrl?'a recipe URL':'recipe text'}.\n\n${isUrl?`URL: ${input}\n\nFetch and parse the recipe at this URL.`:`Recipe text:\n${input}`}\n\n${recipePrompt}`}];
    }

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content.find(b=>b.type==='text')?.text||'';
    const recipe=JSON.parse(text.replace(/```json|```/g,'').trim());

    status.textContent='✓ Recipe parsed! Review and save:';
    preview.innerHTML=`
      <div style="background:var(--bg2);border-radius:var(--r1);padding:12px;font-size:13px">
        <div style="font-weight:600;font-size:15px;margin-bottom:4px">${recipe.name||'Unnamed'}</div>
        ${recipe.side1||recipe.side2?`<div style="color:var(--t2);font-size:12px;margin-bottom:6px">${[recipe.side1,recipe.side2].filter(Boolean).join(' · ')}</div>`:''}
        ${recipe.kcal!=null?`<div style="font-size:11px;color:var(--t2);margin-bottom:6px">🔥 ${recipe.kcal} cal · 💪 ${recipe.prot||0}g · 🌾 ${recipe.carbs||0}g · 🧈 ${recipe.fat||0}g <span style="color:var(--t3)">(per serving)</span></div>`:''}
        <div style="font-size:11px;color:var(--t3);margin-bottom:4px">${(recipe.ingredients||[]).length} ingredients · ${recipe.servings||4} servings · ${(recipe.steps||[]).length} steps</div>
        <div style="max-height:80px;overflow-y:auto;font-size:12px;color:var(--t2)">${(recipe.ingredients||[]).slice(0,8).map(i=>`${i.a} ${i.u} ${i.n}`).join(', ')}${(recipe.ingredients||[]).length>8?'…':''}</div>
      </div>
      <button class="btn btnp" onclick="saveImportedRecipe()" style="width:100%;margin-top:10px;justify-content:center">Add to Dinner Bank</button>`;
    window._importedRecipe=recipe;
  }catch(e){
    status.textContent='';
    preview.innerHTML=`<div style="color:#E24B4A;font-size:12px;padding:8px;background:#FDECEA;border-radius:var(--r1)">Could not parse recipe: ${e.message}. Try pasting the recipe text directly instead.</div>`;
  }
  btn.disabled=false;btn.textContent='Import with AI';
}

function saveImportedRecipe(){
  const r=window._importedRecipe;
  if(!r)return;
  const meal={
    id:'m'+Date.now(),
    name:r.name||'Imported Recipe',
    sides:[r.side1||'',r.side2||''],
    macros:{kcal:r.kcal||null,prot:r.prot||null,carbs:r.carbs||null,fat:r.fat||null},
    ingredients:(r.ingredients||[]).map(i=>({n:i.n,a:parseFloat(i.a)||0,u:i.u||''})),
    steps:(r.steps||[]).map(s=>s.trim()).filter(Boolean),
    rating:0,fav:false
  };
  S.meals.push(meal);
  save();closeModal();render();
  // Flash the new meal by switching to bank view
  setView('bank');
}

function copyWeek(){
  const dates=planDates();
  const n=S.planType==='week'?7:S.planType==='biweekly'?14:30;
  const nextStart=addDays(S.planStart,n);
  dates.forEach(date=>{
    const nextDate=addDays(date,n);
    const day=getDay(date);
    if(day.mealId)S.days[nextDate]={...day};
  });
  S.planStart=nextStart;
  save();render();
}

function weekNutritionSummary(){
  let totalKcal=0,count=0;
  planDates().forEach(date=>{
    const day=getDay(date);

    if(meal&&meal.macros&&meal.macros.kcal){totalKcal+=meal.macros.kcal*day.servings;count++;}
  });
  if(!count)return'no data';
  return Math.round(totalKcal)+' cal total';
}

function openShareModal(){
  const dates=planDates();

  dates.forEach(date=>{
    const day=getDay(date);
    const meal=S.meals.find(m=>m.id===day.mealId);
    lines.push(`${dayLabel(date)}: ${meal?meal.name:'(no meal)'} ${meal&&meal.sides[0]?'· '+meal.sides[0]:''}${meal&&meal.sides[1]?' · '+meal.sides[1]:''}`);
  });
  lines.push('');
  lines.push('🛒 Shopping List:');
  const totals={};
  dates.forEach(date=>{
    const day=getDay(date);
    const meal=S.meals.find(m=>m.id===day.mealId);
    if(!meal)return;
    meal.ingredients.forEach(ing=>{
      const key=ing.n+'|||'+ing.u;
      if(!totals[key])totals[key]={n:ing.n,u:ing.u,a:0};
      totals[key].a+=ing.a*day.servings;
    });
  });
  Object.values(totals).sort((a,b)=>a.n.localeCompare(b.n)).forEach(item=>{
    const amt=item.a%1===0?item.a:parseFloat(item.a.toFixed(2));
    lines.push(`• ${item.n}: ${amt}${item.u?' '+item.u:''}`);
  });
  const text=lines.join('\n');
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">

  document.getElementById('add-btn').onclick=()=>{
    if(S.view==='bank')openMealModal(null);
    else if(S.view==='profiles')openProfileModal(null);
  };
  document.getElementById('nutri-toggle').onclick=()=>{S.nutri=!S.nutri;render();};
  // Search boxes (need live DOM reference)
  const bs=document.getElementById('bank-search');
  if(bs)bs.oninput=function(){
    const q=this.value.toLowerCase();
    document.querySelectorAll('.card[onclick]').forEach(el=>{
      const name=el.querySelector('[style*="font-weight:500"]');
      if(name)el.style.display=name.textContent.toLowerCase().includes(q)?'':'none';
    });
  };
}

load();
</script>
<!-- Splash Screen -->
<div id="splash">
  <img src="icon.png" alt="">
  <span>Dinner Planner</span>
</div>

<script>
// Hide splash after load
window.addEventListener('load', () => {
  setTimeout(() => {
    const s = document.getElementById('splash');
    s.classList.add('hidden');
    setTimeout(() => s.remove(), 450);
  }, 600);
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}

// Haptic helper
function haptic(ms = 10) {
  try { navigator.vibrate(ms); } catch(e) {}
}
</script>
</body>
